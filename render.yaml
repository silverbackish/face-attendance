services:
  - type: web
    name: face-attendance
    env: docker          # IMPORTANT: This tells Render to use your Dockerfile
    region: singapore
    plan: free
    # Note: buildCommand and startCommand are removed because 
    # they are now handled inside the Dockerfile.
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: MAIL_EMAIL
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: TEACHER_EMAIL
        sync: false
      - key: REPORT_HOUR_UTC
        value: "12"
      - key: REPORT_MINUTE_UTC
        value: "30"